<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanchão Caraguá - Checkout Transparente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- SDK do Mercado Pago para tokenização de cartão -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #fefaf5; padding: 20px; }
    .container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; gap: 2rem; }
    .cardapio { flex: 2; }
    .checkout { flex: 1.5; background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
    .produto { background: white; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffe0cc; }
    .carrinho-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    button { background: #d13f1f; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .pagamento-tabs { display: flex; gap: 10px; margin: 1rem 0; }
    .tab { flex: 1; text-align: center; padding: 10px; background: #f0dbcf; border-radius: 40px; cursor: pointer; }
    .tab.active { background: #d13f1f; color: white; }
    .qr-code { text-align: center; margin-top: 1rem; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 18px; border: 1.5px solid #f0dbcf; }
    .status { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
    h2 { margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="cardapio">
    <h2>🍔 Cardápio</h2>
    <div id="produtos"></div>
  </div>
  <div class="checkout">
    <h2>🛒 Seu Pedido</h2>
    <div id="carrinho"></div>
    <div id="total" style="font-weight: bold; margin: 1rem 0;"></div>
    <input type="text" id="nome" placeholder="Seu nome completo">
    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="text" id="endereco" placeholder="Endereço de entrega">

    <div class="pagamento-tabs">
      <div class="tab active" data-method="pix">Pix</div>
      <div class="tab" data-method="card">Cartão (Crédito/Débito)</div>
    </div>

    <div id="pix-area">
      <div id="qr-code-container" class="qr-code"></div>
      <input type="text" id="pix-copia-cola" readonly placeholder="Código Pix aparecerá aqui" style="background:#f9f2ec;">
    </div>

    <div id="card-area" style="display:none;">
      <select id="paymentMethodId">
        <option value="visa">Visa</option>
        <option value="master">Mastercard</option>
        <option value="amex">American Express</option>
        <option value="elo">Elo</option>
        <option value="hipercard">Hipercard</option>
      </select>
      <input type="text" id="cardNumber" placeholder="Número do cartão" maxlength="16">
      <div style="display: flex; gap: 10px;">
        <input type="text" id="expMonth" placeholder="Mês (MM)" maxlength="2">
        <input type="text" id="expYear" placeholder="Ano (AAAA)" maxlength="4">
        <input type="text" id="cvv" placeholder="CVV" maxlength="4">
      </div>
      <input type="text" id="cardholderName" placeholder="Nome no cartão">
      <input type="text" id="docNumber" placeholder="CPF (apenas números)">
      <input type="text" id="installments" placeholder="Parcelas" value="1">
    </div>

    <button id="pagarBtn" style="width:100%; margin-top:1rem;">Pagar Agora</button>
    <div id="status" class="status"></div>
  </div>
</div>

<script>
  // ======================== PRODUTOS ========================
  const produtos = [
    { id: 1, nome: "X-Salada Especial", preco: 22.90 },
    { id: 2, nome: "X-Bacon Supreme", preco: 28.90 },
    { id: 3, nome: "Cheddar Duplo", preco: 32.90 },
    { id: 4, nome: "Hot Dog Completo", preco: 16.90 },
    { id: 5, nome: "Batata Frita com Cheddar", preco: 14.90 },
    { id: 6, nome: "Milkshake de Chocolate", preco: 15.90 }
  ];
  let carrinho = [];

  function renderProdutos() {
    const div = document.getElementById('produtos');
    div.innerHTML = produtos.map(p => `
      <div class="produto">
        <span><strong>${p.nome}</strong> - R$ ${p.preco.toFixed(2)}</span>
        <button onclick="adicionar(${p.id})">Adicionar</button>
      </div>
    `).join('');
  }

  function adicionar(id) {
    const prod = produtos.find(p => p.id === id);
    const item = carrinho.find(i => i.id === id);
    if (item) item.qtd++;
    else carrinho.push({ ...prod, qtd: 1 });
    renderCarrinho();
  }

  function renderCarrinho() {
    const div = document.getElementById('carrinho');
    if (carrinho.length === 0) {
      div.innerHTML = 'Carrinho vazio';
      document.getElementById('total').innerHTML = '';
      return;
    }
    let html = '';
    let total = 0;
    carrinho.forEach(item => {
      const subtotal = item.preco * item.qtd;
      total += subtotal;
      html += `<div class="carrinho-item">
        <span>${item.nome} x${item.qtd}</span>
        <span>R$ ${subtotal.toFixed(2)}</span>
        <button onclick="remover(${item.id})">Remover</button>
      </div>`;
    });
    div.innerHTML = html;
    document.getElementById('total').innerHTML = `<strong>Total: R$ ${total.toFixed(2)}</strong>`;
  }

  function remover(id) {
    carrinho = carrinho.filter(i => i.id !== id);
    renderCarrinho();
  }

  // ======================== PAGAMENTO ========================
  let metodo = 'pix';
  const mp = new MercadoPago('SUA_PUBLIC_KEY_AQUI'); // Substitua pela sua Public Key

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      metodo = tab.dataset.method;
      document.getElementById('pix-area').style.display = metodo === 'pix' ? 'block' : 'none';
      document.getElementById('card-area').style.display = metodo === 'card' ? 'block' : 'none';
    });
  });

  async function processarPagamento() {
    const statusDiv = document.getElementById('status');
    if (carrinho.length === 0) {
      statusDiv.innerHTML = '<span style="color:red;">Adicione itens ao carrinho</span>';
      return;
    }
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      statusDiv.innerHTML = '<span style="color:red;">E-mail obrigatório</span>';
      return;
    }
    const endereco = document.getElementById('endereco').value.trim();
    if (!endereco) {
      statusDiv.innerHTML = '<span style="color:red;">Endereço obrigatório</span>';
      return;
    }

    const total = carrinho.reduce((s, i) => s + i.preco * i.qtd, 0);
    const description = `Pedido Lanchão - ${carrinho.map(i => `${i.qtd}x ${i.nome}`).join(', ')}`;

    const payer = {
      name: nome || 'Cliente',
      email: email,
    };

    try {
      statusDiv.innerHTML = '<span style="color:blue;">Processando...</span>';

      if (metodo === 'pix') {
        const response = await fetch('/.netlify/functions/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'pix',
            amount: total,
            description,
            payer,
          })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (data.qr_code_base64) {
          document.getElementById('qr-code-container').innerHTML = `<img src="data:image/png;base64,${data.qr_code_base64}" style="max-width:200px;"><br><button onclick="navigator.clipboard.writeText('${data.qr_code}')">Copiar código Pix</button>`;
          document.getElementById('pix-copia-cola').value = data.qr_code;
        } else if (data.ticket_url) {
          document.getElementById('qr-code-container').innerHTML = `<a href="${data.ticket_url}" target="_blank">Clique para pagar</a>`;
        }
        statusDiv.innerHTML = '<span style="color:green;">✅ Pix gerado! Escaneie o QR Code e pague. O pedido será confirmado após o pagamento.</span>';
      } 
      else if (metodo === 'card') {
        // Tokenização do cartão
        const cardNumber = document.getElementById('cardNumber').value.replace(/\D/g, '');
        const expMonth = document.getElementById('expMonth').value;
        const expYear = document.getElementById('expYear').value;
        const cvv = document.getElementById('cvv').value;
        const cardholderName = document.getElementById('cardholderName').value;
        const docNumber = document.getElementById('docNumber').value.replace(/\D/g, '');
        const installments = parseInt(document.getElementById('installments').value) || 1;
        const paymentMethodId = document.getElementById('paymentMethodId').value;

        if (!cardNumber || !expMonth || !expYear || !cvv || !cardholderName || !docNumber) {
          throw new Error('Preencha todos os dados do cartão');
        }

        // Criar token
        const tokenResponse = await mp.fields.create('cardToken', {
          cardNumber: cardNumber,
          expirationMonth: expMonth,
          expirationYear: expYear,
          securityCode: cvv,
          cardholderName: cardholderName,
          identification: { type: 'CPF', number: docNumber }
        });
        const token = tokenResponse.id;

        const response = await fetch('/.netlify/functions/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'card',
            amount: total,
            description,
            payer: { ...payer, identification: { type: 'CPF', number: docNumber } },
            paymentMethodId,
            token,
            installments,
            issuerId: null
          })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (data.status === 'approved') {
          statusDiv.innerHTML = '<span style="color:green;">✅ Pagamento aprovado! Seu pedido está confirmado.</span>';
          carrinho = [];
          renderCarrinho();
        } else {
          statusDiv.innerHTML = `<span style="color:red;">❌ Pagamento ${data.status_detail || data.status}. Tente novamente.</span>`;
        }
      }
    } catch (err) {
      console.error(err);
      statusDiv.innerHTML = `<span style="color:red;">Erro: ${err.message}</span>`;
    }
  }

  document.getElementById('pagarBtn').addEventListener('click', processarPagamento);
  renderProdutos();
  renderCarrinho();
</script>
</body>
</html>
