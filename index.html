<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Lanchão Caraguá - Pagamento Online (Pix/Cartão)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Mercado Pago JS SDK -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    /* Estilos (mesmo do anterior, compactado) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #fefaf5; color: #2c241a; }
    .header { background: linear-gradient(135deg, #25D366, #128C7E); color: white; padding: 1.5rem 2rem; }
    .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .logo h1 { font-size: 1.8rem; }
    .badge-local { background: rgba(255,255,240,0.2); padding: 0.4rem 1rem; border-radius: 40px; }
    .main-container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; display: flex; flex-wrap: wrap; gap: 2rem; }
    .products-section { flex: 2; min-width: 260px; }
    .cart-payment { flex: 1.2; min-width: 320px; background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 12px 28px rgba(0,0,0,0.08); border: 1px solid #ffe0cc; position: sticky; top: 1.5rem; height: fit-content; }
    .section-title { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #d13f1f, #b94424); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .category-title { font-size: 1.5rem; font-weight: 600; margin: 1.8rem 0 1rem; border-bottom: 2px solid #ffddd0; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.8rem; }
    .product-card { background: white; border-radius: 28px; overflow: hidden; border: 1px solid #ffe0cc; padding: 1rem; }
    .product-img { width: 100%; height: 150px; object-fit: cover; border-radius: 20px; }
    .product-name { font-weight: 700; font-size: 1.2rem; margin: 0.5rem 0 0.2rem; }
    .price-add { display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem; }
    .product-price { font-weight: 800; font-size: 1.3rem; color: #c2410c; }
    .add-to-cart { background: #d13f1f; border: none; color: white; padding: 8px 14px; border-radius: 40px; cursor: pointer; }
    .cart-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    .cart-items { max-height: 300px; overflow-y: auto; margin-bottom: 1rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid #f5e4da; }
    .cart-total { font-weight: 800; font-size: 1.3rem; border-top: 2px dashed #f1d9cd; padding-top: 0.8rem; margin: 0.5rem 0; }
    .form-group { margin-bottom: 1rem; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border-radius: 18px; border: 1.5px solid #f0dbcf; background: #fffdfb; }
    .payment-method-tabs { display: flex; gap: 10px; margin-bottom: 1rem; }
    .tab-btn { flex: 1; padding: 10px; background: #f0dbcf; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .tab-btn.active { background: #d13f1f; color: white; }
    .pay-btn { background: #25D366; color: white; border: none; width: 100%; padding: 14px; font-weight: 700; border-radius: 50px; cursor: pointer; margin-top: 1rem; }
    .status-msg { margin-top: 12px; text-align: center; font-size: 0.8rem; }
    footer { background: #2c241a; color: #e2cfc0; text-align: center; padding: 1.5rem; margin-top: 2rem; }
    @media (max-width: 900px) { .main-container { flex-direction: column; } .cart-payment { position: static; } }
    .qr-code-area { text-align: center; margin-top: 1rem; }
    .qr-code-area img { max-width: 200px; margin: 0 auto; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-content">
    <div class="logo"><h1><i class="fab fa-whatsapp"></i> Lanchão Caraguá</h1><p><i class="fas fa-map-marker-alt"></i> Caraguatatuba</p></div>
    <div class="badge-local"><i class="fab fa-whatsapp"></i> Pagamento Online (Pix/Cartão)</div>
  </div>
</div>

<div class="main-container">
  <div class="products-section">
    <div class="section-title">Cardápio Online</div>
    <div id="categories-container"></div>
  </div>

  <div class="cart-payment">
    <div class="cart-header"><h3><i class="fas fa-shopping-bag"></i> Seu Pedido</h3><button id="clearCartBtn" style="background:none;border:none;color:#b95a3a;">Limpar</button></div>
    <div id="cartItemsContainer"><div class="empty-cart-msg" style="text-align:center;color:#b28b72;">Carrinho vazio</div></div>
    <div class="cart-total"><span>Total</span><span id="cartTotalValue">R$ 0,00</span></div>

    <div class="form-group"><input type="text" id="customerName" placeholder="Seu nome completo"></div>
    <div class="form-group"><input type="email" id="customerEmail" placeholder="Seu e-mail (obrigatório)"></div>
    <div class="form-group"><input type="text" id="deliveryAddress" placeholder="Endereço de entrega"></div>

    <div class="payment-method-tabs">
      <button class="tab-btn active" data-method="pix">Pix</button>
      <button class="tab-btn" data-method="card">Cartão (Crédito/Débito)</button>
    </div>

    <!-- Área Pix -->
    <div id="pixArea">
      <div class="form-group"><label>Chave Pix (gerada automaticamente)</label><input type="text" id="pixQrCode" readonly placeholder="QR Code será exibido" style="background:#f9f2ec;"></div>
      <div id="pixQrCodeImage" class="qr-code-area"></div>
    </div>

    <!-- Área Cartão (oculta inicialmente) -->
    <div id="cardArea" style="display:none;">
      <div class="form-group"><select id="paymentMethodId"><option value="visa">Visa</option><option value="master">Mastercard</option><option value="amex">American Express</option><option value="elo">Elo</option><option value="hipercard">Hipercard</option></select></div>
      <div class="form-group"><input type="text" id="cardNumber" placeholder="Número do cartão" maxlength="16"></div>
      <div class="form-group" style="display:flex; gap:10px;"><input type="text" id="cardExpMonth" placeholder="Mês (MM)" maxlength="2" style="width:33%;"><input type="text" id="cardExpYear" placeholder="Ano (AAAA)" maxlength="4" style="width:33%;"><input type="text" id="cardCvv" placeholder="CVV" maxlength="4" style="width:33%;"></div>
      <div class="form-group"><input type="text" id="cardholderName" placeholder="Nome no cartão"></div>
      <div class="form-group"><input type="text" id="installments" placeholder="Parcelas (1 a 12)" value="1"></div>
      <div class="form-group"><input type="text" id="docNumber" placeholder="CPF (apenas números)"></div>
    </div>

    <button id="payButton" class="pay-btn"><i class="fas fa-credit-card"></i> Pagar Agora</button>
    <div id="paymentStatus" class="status-msg"></div>
  </div>
</div>
<footer>Lanchão Caraguá - Pagamento processado com segurança via Mercado Pago. Pix, cartão crédito/débito.</footer>

<script>
  // ======================= CARDÁPIO E CARRINHO (mesmo do exemplo anterior) =======================
  const produtos = [
    { id: 1, nome: "X-Salada Especial", descricao: "Hambúrguer 150g, alface, tomate, queijo", preco: 22.90, categoria: "hamburgueres", imagem: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=180&fit=crop" },
    { id: 2, nome: "X-Bacon Supreme", descricao: "Duas carnes, bacon crocante, cheddar", preco: 28.90, categoria: "hamburgueres", imagem: "https://images.unsplash.com/photo-1553979459-d2229ba7433a?w=300&h=180&fit=crop" },
    { id: 3, nome: "Cheddar Duplo", descricao: "Pão australiano, cheddar, onion rings", preco: 32.90, categoria: "hamburgueres", imagem: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=300&h=180&fit=crop" },
    { id: 4, nome: "Hot Dog Completo", descricao: "Salsão, purê, vinagrete, batata palha", preco: 16.90, categoria: "especiais", imagem: "https://images.unsplash.com/photo-1613828364875-5317093d6e20?w=300&h=180&fit=crop" },
    { id: 5, nome: "Batata Frita com Cheddar", descricao: "Batata rústica com cheddar e bacon", preco: 14.90, categoria: "porcoes", imagem: "https://images.unsplash.com/photo-1630384060421-cb20f0e0649d?w=300&h=180&fit=crop" },
    { id: 6, nome: "Milkshake de Chocolate", descricao: "Com calda e chantilly", preco: 15.90, categoria: "bebidas", imagem: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=300&h=180&fit=crop" },
    { id: 7, nome: "Refrigerante Lata", descricao: "Coca, Guaraná, Fanta", preco: 6.90, categoria: "bebidas", imagem: "https://images.unsplash.com/photo-1581006852262-e4307cf6283a?w=300&h=180&fit=crop" }
  ];
  const categorias = [
    { id: "hamburgueres", nome: "🍔 Hambúrgueres" },
    { id: "especiais", nome: "🌭 Especiais" },
    { id: "porcoes", nome: "🍟 Porções" },
    { id: "bebidas", nome: "🥤 Bebidas" }
  ];

  let carrinho = [];

  // Renderização do cardápio
  function renderCardapio() {
    const container = document.getElementById('categories-container');
    container.innerHTML = '';
    for (let cat of categorias) {
      const prods = produtos.filter(p => p.categoria === cat.id);
      if (!prods.length) continue;
      const catDiv = document.createElement('div');
      catDiv.innerHTML = `<div class="category-title">${cat.nome}</div><div class="products-grid" data-cat="${cat.id}"></div>`;
      container.appendChild(catDiv);
      const grid = catDiv.querySelector('.products-grid');
      prods.forEach(prod => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img class="product-img" src="${prod.imagem}" onerror="this.src='https://placehold.co/300x180?text=Lanches'">
          <div class="product-name">${prod.nome}</div>
          <div class="product-desc" style="font-size:0.8rem; color:#7f6b5c;">${prod.descricao}</div>
          <div class="price-add"><span class="product-price">R$ ${prod.preco.toFixed(2)}</span><button class="add-to-cart" data-id="${prod.id}">+ Adicionar</button></div>
        `;
        grid.appendChild(card);
      });
    }
    document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', (e) => {
      const id = parseInt(btn.dataset.id);
      const prod = produtos.find(p => p.id === id);
      if (prod) adicionarAoCarrinho(prod);
    }));
  }

  function adicionarAoCarrinho(prod) {
    const existente = carrinho.find(i => i.id === prod.id);
    if (existente) existente.quantidade++;
    else carrinho.push({ ...prod, quantidade: 1 });
    atualizarCarrinhoUI();
  }

  function atualizarCarrinhoUI() {
    const total = carrinho.reduce((s,i) => s + i.preco * i.quantidade, 0);
    document.getElementById('cartTotalValue').innerText = `R$ ${total.toFixed(2)}`;
    const cartContainer = document.getElementById('cartItemsContainer');
    if (!carrinho.length) {
      cartContainer.innerHTML = '<div style="text-align:center;color:#b28b72;">Carrinho vazio</div>';
      return;
    }
    let html = '';
    carrinho.forEach(item => {
      html += `<div class="cart-item">
        <div><strong>${item.nome}</strong><br>R$ ${item.preco.toFixed(2)}</div>
        <div><button class="qty-btn dec" data-id="${item.id}">-</button> ${item.quantidade} <button class="qty-btn inc" data-id="${item.id}">+</button></div>
        <div>R$ ${(item.preco * item.quantidade).toFixed(2)}</div>
        <button class="remove-item" data-id="${item.id}"><i class="fas fa-trash"></i></button>
      </div>`;
    });
    cartContainer.innerHTML = html;
    document.querySelectorAll('.dec').forEach(btn => btn.addEventListener('click', (e) => alterarQuantidade(parseInt(btn.dataset.id), -1)));
    document.querySelectorAll('.inc').forEach(btn => btn.addEventListener('click', (e) => alterarQuantidade(parseInt(btn.dataset.id), 1)));
    document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => removerItem(parseInt(btn.dataset.id))));
  }

  function alterarQuantidade(id, delta) {
    const idx = carrinho.findIndex(i => i.id === id);
    if (idx !== -1) {
      carrinho[idx].quantidade += delta;
      if (carrinho[idx].quantidade <= 0) carrinho.splice(idx,1);
      atualizarCarrinhoUI();
    }
  }
  function removerItem(id) { carrinho = carrinho.filter(i => i.id !== id); atualizarCarrinhoUI(); }
  document.getElementById('clearCartBtn').addEventListener('click', () => { carrinho = []; atualizarCarrinhoUI(); });

  // ======================= CHECKOUT TRANSPARENTE =======================
  let selectedMethod = 'pix';
  const tabBtns = document.querySelectorAll('.tab-btn');
  const pixArea = document.getElementById('pixArea');
  const cardArea = document.getElementById('cardArea');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMethod = btn.dataset.method;
      if (selectedMethod === 'pix') {
        pixArea.style.display = 'block';
        cardArea.style.display = 'none';
      } else {
        pixArea.style.display = 'none';
        cardArea.style.display = 'block';
      }
    });
  });

  const payButton = document.getElementById('payButton');
  const statusDiv = document.getElementById('paymentStatus');

  async function processarPagamento() {
    if (carrinho.length === 0) {
      statusDiv.innerHTML = '<span style="color:#b85c3a;">Carrinho vazio</span>';
      return;
    }
    const nome = document.getElementById('customerName').value.trim();
    const email = document.getElementById('customerEmail').value.trim();
    if (!email || !email.includes('@')) {
      statusDiv.innerHTML = '<span style="color:#b85c3a;">E-mail obrigatório para pagamento</span>';
      return;
    }
    const endereco = document.getElementById('deliveryAddress').value.trim();
    if (!endereco) {
      statusDiv.innerHTML = '<span style="color:#b85c3a;">Informe o endereço de entrega</span>';
      return;
    }

    const total = carrinho.reduce((s,i) => s + i.preco * i.quantidade, 0);
    const description = `Pedido Lanchão Caraguá - ${carrinho.map(i=>`${i.quantidade}x ${i.nome}`).join(', ')}`;

    const payer = {
      name: nome,
      email: email,
      identification: selectedMethod === 'card' ? { type: 'CPF', number: document.getElementById('docNumber').value.replace(/\D/g,'') } : undefined
    };

    try {
      statusDiv.innerHTML = '<span style="color:#0079c1;">Processando pagamento...</span>';

      if (selectedMethod === 'pix') {
        const response = await fetch('/.netlify/functions/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'pix',
            amount: total,
            description,
            payer
          })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        // Exibe QR Code e código copia e cola
        const qrCodeBase64 = data.qr_code_base64;
        const qrCodeText = data.qr_code;
        document.getElementById('pixQrCode').value = qrCodeText;
        const imgDiv = document.getElementById('pixQrCodeImage');
        if (qrCodeBase64) {
          imgDiv.innerHTML = `<img src="data:image/png;base64,${qrCodeBase64}" alt="QR Code Pix"><br><button onclick="navigator.clipboard.writeText('${qrCodeText}')">Copiar código Pix</button>`;
        } else {
          imgDiv.innerHTML = `<p>Link para pagamento: <a href="${data.ticket_url}" target="_blank">Clique aqui</a></p>`;
        }
        statusDiv.innerHTML = '<span style="color:#1f7a5a;">✅ Pix gerado! Escaneie o QR Code ou copie o código. Aguarde confirmação do pagamento.</span>';
        // Opcional: limpar carrinho após sucesso? Melhor esperar confirmação, mas vamos sugerir recarregar a página após pagamento.
      } 
      else if (selectedMethod === 'card') {
        // Cartão - precisamos de tokenização do Mercado Pago
        const mp = new MercadoPago(process.env.MP_PUBLIC_KEY || 'TEST-xxxxxxxxxxxx'); // ATENÇÃO: pública key precisa ser configurada
        const cardNumber = document.getElementById('cardNumber').value.replace(/\D/g,'');
        const expMonth = document.getElementById('cardExpMonth').value;
        const expYear = document.getElementById('cardExpYear').value;
        const cvv = document.getElementById('cardCvv').value;
        const cardholderName = document.getElementById('cardholderName').value;
        const installments = parseInt(document.getElementById('installments').value) || 1;
        const paymentMethodId = document.getElementById('paymentMethodId').value;

        // Criar token do cartão
        const tokenResponse = await mp.fields.create('cardToken', {
          cardNumber: cardNumber,
          expirationMonth: expMonth,
          expirationYear: expYear,
          securityCode: cvv,
          cardholderName: cardholderName
        });
        const token = tokenResponse.id;

        const response = await fetch('/.netlify/functions/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'card',
            amount: total,
            description,
            payer,
            paymentMethodId,
            token,
            installments,
            issuerId: null
          })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (data.status === 'approved') {
          statusDiv.innerHTML = '<span style="color:#1f7a5a;">✅ Pagamento aprovado! Pedido confirmado.</span>';
          carrinho = [];
          atualizarCarrinhoUI();
        } else {
          statusDiv.innerHTML = `<span style="color:#b85c3a;">❌ Pagamento ${data.status_detail || data.status}. Tente novamente.</span>`;
        }
      }
    } catch (err) {
      console.error(err);
      statusDiv.innerHTML = `<span style="color:#b85c3a;">Erro: ${err.message}</span>`;
    }
  }

  payButton.addEventListener('click', processarPagamento);

  renderCardapio();
  atualizarCarrinhoUI();
</script>
</body>
</html>
