<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lanchão Caraguá - Pagamento Online</title>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    .produto { border: 1px solid #ddd; margin: 10px; padding: 10px; display: inline-block; width: 200px; }
    button { background: #25D366; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 8px; margin-top: 10px; }
    input, select { padding: 8px; margin: 5px 0; width: 100%; }
    .qr-code { text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🍔 Lanchão Caraguá</h1>
  <div id="produtos"></div>
  <div style="margin-top: 30px;">
    <h3>🛒 Carrinho</h3>
    <div id="carrinho"></div>
    <div id="total"></div>
    <input type="text" id="nome" placeholder="Seu nome">
    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="text" id="endereco" placeholder="Endereço de entrega">
    <div style="margin: 10px 0;">
      <button id="btnPix">💳 Pagar com Pix</button>
      <button id="btnCartao">💳 Pagar com Cartão</button>
    </div>
    <div id="status"></div>
    <div id="qrCodeArea" class="qr-code"></div>
  </div>

  <script>
    const produtos = [
      { id: 1, nome: "X-Salada Especial", preco: 22.90 },
      { id: 2, nome: "X-Bacon Supreme", preco: 28.90 },
      { id: 3, nome: "Cheddar Duplo", preco: 32.90 },
      { id: 4, nome: "Hot Dog Completo", preco: 16.90 }
    ];
    let carrinho = [];

    function renderizarProdutos() {
      const div = document.getElementById('produtos');
      div.innerHTML = produtos.map(p => `
        <div class="produto">
          <strong>${p.nome}</strong> - R$ ${p.preco.toFixed(2)}
          <br><button onclick="adicionar(${p.id})">➕ Adicionar</button>
        </div>
      `).join('');
    }

    function adicionar(id) {
      const produto = produtos.find(p => p.id === id);
      const item = carrinho.find(i => i.id === id);
      if (item) item.qtd++;
      else carrinho.push({ ...produto, qtd: 1 });
      renderizarCarrinho();
    }

    function renderizarCarrinho() {
      const div = document.getElementById('carrinho');
      if (carrinho.length === 0) {
        div.innerHTML = 'Carrinho vazio';
        document.getElementById('total').innerHTML = '';
        return;
      }
      let html = '';
      let total = 0;
      carrinho.forEach(item => {
        const subtotal = item.preco * item.qtd;
        total += subtotal;
        html += `<div>${item.nome} x${item.qtd} = R$ ${subtotal.toFixed(2)} <button onclick="remover(${item.id})">❌</button></div>`;
      });
      div.innerHTML = html;
      document.getElementById('total').innerHTML = `<strong>Total: R$ ${total.toFixed(2)}</strong>`;
      return total;
    }

    function remover(id) {
      carrinho = carrinho.filter(i => i.id !== id);
      renderizarCarrinho();
    }

    async function processarPagamento(tipo) {
      const total = renderizarCarrinho();
      if (carrinho.length === 0) {
        document.getElementById('status').innerHTML = '<span style="color:red;">Carrinho vazio</span>';
        return;
      }
      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const endereco = document.getElementById('endereco').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('status').innerHTML = '<span style="color:red;">E-mail obrigatório</span>';
        return;
      }
      if (!endereco) {
        document.getElementById('status').innerHTML = '<span style="color:red;">Endereço obrigatório</span>';
        return;
      }

      document.getElementById('status').innerHTML = '<span style="color:blue;">Processando...</span>';
      document.getElementById('qrCodeArea').innerHTML = '';

      if (tipo === 'pix') {
        const response = await fetch('/.netlify/functions/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'pix',
            amount: total,
            description: `Pedido Lanchão Caraguá - ${carrinho.map(i => `${i.qtd}x ${i.nome}`).join(', ')}`,
            payer: { name: nome, email }
          })
        });
        const data = await response.json();
        if (data.error) {
          document.getElementById('status').innerHTML = `<span style="color:red;">Erro: ${data.error}</span>`;
          return;
        }
        if (data.qr_code_base64) {
          document.getElementById('qrCodeArea').innerHTML = `
            <h4>Escaneie o QR Code no seu banco:</h4>
            <img src="data:image/png;base64,${data.qr_code_base64}" style="max-width:200px;">
            <p><strong>Código Pix:</strong> ${data.qr_code}</p>
            <button onclick="navigator.clipboard.writeText('${data.qr_code}')">Copiar código</button>
          `;
        } else if (data.ticket_url) {
          document.getElementById('qrCodeArea').innerHTML = `<a href="${data.ticket_url}" target="_blank">Clique aqui para pagar</a>`;
        }
        document.getElementById('status').innerHTML = '<span style="color:green;">✅ Pix gerado! Escaneie o QR Code para pagar.</span>';
      }
    }

    document.getElementById('btnPix').onclick = () => processarPagamento('pix');
    renderizarProdutos();
    renderizarCarrinho();
  </script>
</body>
</html>
